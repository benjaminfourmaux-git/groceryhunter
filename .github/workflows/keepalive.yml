name: Garder Supabase actif

# Le projet Supabase gratuit se met en pause après 7 jours sans activité.
# Ce ping quotidien (appel de la fonction keepalive) réinitialise le compteur.

on:
  schedule:
    - cron: '0 6 * * *' # tous les jours à 06h00 UTC
  workflow_dispatch: {} # déclenchement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Appeler la fonction keepalive
        run: |
          curl -sf -X POST "$SUPABASE_URL/rest/v1/rpc/keepalive" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d '{}'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
